openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Family Health Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management (admin only)
  - name: family-members
    description: Family member management
  - name: weight
    description: Weight tracking per family member
  - name: length
    description: Height/length tracking per family member
  - name: period
    description: Period tracking per family member (female only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user (pending admin approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registration submitted, pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account suspended or pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, suspended]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a user's password (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/suspend:
    post:
      operationId: suspendUser
      tags: [users]
      summary: Suspend a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/approve:
    post:
      operationId: approveUser
      tags: [users]
      summary: Approve a pending user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/activate:
    post:
      operationId: activateUser
      tags: [users]
      summary: Reactivate a suspended user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /stats/admin-overview:
    get:
      operationId: getAdminOverview
      tags: [users]
      summary: Get admin overview stats (admin only)
      responses:
        "200":
          description: Admin overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /family-members:
    get:
      operationId: listFamilyMembers
      tags: [family-members]
      summary: List current user's family members
      responses:
        "200":
          description: List of family members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createFamilyMember
      tags: [family-members]
      summary: Add a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyMemberBody"
      responses:
        "201":
          description: Family member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /family-members/{id}:
    get:
      operationId: getFamilyMember
      tags: [family-members]
      summary: Get a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFamilyMember
      tags: [family-members]
      summary: Update a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFamilyMemberBody"
      responses:
        "200":
          description: Updated family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteFamilyMember
      tags: [family-members]
      summary: Delete a family member and all their data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weight:
    get:
      operationId: listWeightEntries
      tags: [weight]
      summary: List weight entries for a family member
      parameters:
        - name: memberId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of weight entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeightEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createWeightEntry
      tags: [weight]
      summary: Add a weight entry for a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeightEntryBody"
      responses:
        "201":
          description: Weight entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /weight/{id}:
    patch:
      operationId: updateWeightEntry
      tags: [weight]
      summary: Update a weight entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWeightEntryBody"
      responses:
        "200":
          description: Updated weight entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteWeightEntry
      tags: [weight]
      summary: Delete a weight entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /length:
    get:
      operationId: listLengthEntries
      tags: [length]
      summary: List height/length entries for a family member
      parameters:
        - name: memberId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of length entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LengthEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createLengthEntry
      tags: [length]
      summary: Add a height/length entry for a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLengthEntryBody"
      responses:
        "201":
          description: Length entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LengthEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /length/{id}:
    patch:
      operationId: updateLengthEntry
      tags: [length]
      summary: Update a height/length entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLengthEntryBody"
      responses:
        "200":
          description: Updated length entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LengthEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLengthEntry
      tags: [length]
      summary: Delete a height/length entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /period:
    get:
      operationId: listPeriodEntries
      tags: [period]
      summary: List period entries for a female family member
      parameters:
        - name: memberId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of period entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PeriodEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (member is not female)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPeriodEntry
      tags: [period]
      summary: Add a period entry for a female family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePeriodEntryBody"
      responses:
        "201":
          description: Period entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeriodEntry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /period/{id}:
    patch:
      operationId: updatePeriodEntry
      tags: [period]
      summary: Update a period entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePeriodEntryBody"
      responses:
        "200":
          description: Updated period entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeriodEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePeriodEntry
      tags: [period]
      summary: Delete a period entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, user]
        status:
          type: string
          enum: [pending, active, suspended]
        createdAt:
          type: string
          format: date-time
      required: [id, username, displayName, role, status, createdAt]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user]

    RegisterBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
      required: [username, password, displayName]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    UpdateMeBody:
      type: object
      properties:
        displayName:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, user]
        status:
          type: string
          enum: [pending, active, suspended]
      required: [username, password, displayName]

    UpdateUserBody:
      type: object
      properties:
        displayName:
          type: string
        role:
          type: string
          enum: [admin, user]
        status:
          type: string
          enum: [pending, active, suspended]

    ResetPasswordBody:
      type: object
      properties:
        newPassword:
          type: string
      required: [newPassword]

    AdminOverview:
      type: object
      properties:
        totalUsers:
          type: integer
        pendingUsers:
          type: integer
        activeUsers:
          type: integer
        suspendedUsers:
          type: integer
        totalFamilyMembers:
          type: integer
        totalWeightEntries:
          type: integer
        totalLengthEntries:
          type: integer
        totalPeriodEntries:
          type: integer
      required:
        - totalUsers
        - pendingUsers
        - activeUsers
        - suspendedUsers
        - totalFamilyMembers
        - totalWeightEntries
        - totalLengthEntries
        - totalPeriodEntries

    FamilyMember:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dateOfBirth:
          type: ["string", "null"]
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, userId, name, gender, createdAt]

    CreateFamilyMemberBody:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dateOfBirth:
          type: string
          format: date
      required: [name, gender]

    UpdateFamilyMemberBody:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
          enum: [male, female]
        dateOfBirth:
          type: ["string", "null"]
          format: date

    WeightEntry:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: integer
        weightKg:
          type: number
        recordedAt:
          type: string
          format: date-time
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, memberId, weightKg, recordedAt, createdAt]

    CreateWeightEntryBody:
      type: object
      properties:
        memberId:
          type: integer
        weightKg:
          type: number
        recordedAt:
          type: string
          format: date-time
        note:
          type: string
      required: [memberId, weightKg, recordedAt]

    UpdateWeightEntryBody:
      type: object
      properties:
        weightKg:
          type: number
        recordedAt:
          type: string
          format: date-time
        note:
          type: ["string", "null"]

    LengthEntry:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: integer
        lengthCm:
          type: number
        recordedAt:
          type: string
          format: date-time
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, memberId, lengthCm, recordedAt, createdAt]

    CreateLengthEntryBody:
      type: object
      properties:
        memberId:
          type: integer
        lengthCm:
          type: number
        recordedAt:
          type: string
          format: date-time
        note:
          type: string
      required: [memberId, lengthCm, recordedAt]

    UpdateLengthEntryBody:
      type: object
      properties:
        lengthCm:
          type: number
        recordedAt:
          type: string
          format: date-time
        note:
          type: ["string", "null"]

    PeriodEntry:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: ["string", "null"]
          format: date
        numberOfDays:
          type: ["integer", "null"]
          description: Automatically calculated from startDate and endDate
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, memberId, startDate, createdAt]

    CreatePeriodEntryBody:
      type: object
      properties:
        memberId:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        note:
          type: string
      required: [memberId, startDate]

    UpdatePeriodEntryBody:
      type: object
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: ["string", "null"]
          format: date
        note:
          type: ["string", "null"]
